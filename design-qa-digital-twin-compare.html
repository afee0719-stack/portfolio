<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Twin Design QA</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; background: #05070b; color: #dce9ff; font-family: Arial, sans-serif; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    figure { margin: 0; border: 1px solid #173968; background: #02060d; }
    figcaption { padding: 10px 12px; color: #78aefc; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <main>
    <figure>
      <figcaption>Reference HTML</figcaption>
      <img src="./design-qa-digital-twin-source.png" alt="参考 HTML 首屏" />
    </figure>
    <figure>
      <figcaption>Integrated React Route</figcaption>
      <img src="./design-qa-digital-twin-desktop.png" alt="集成后的 React 路由首屏" />
    </figure>
  </main>
</body>
</html>
